<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ Ninja KumBI · Premium Clicker ⚡</title>
  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      background: #0a0e13;
      background-image: radial-gradient(circle at 50% 0%, #3a2c1a 0%, #0a0e13 60%);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    /* 暗色磨砂卡片 */
    .glass-panel {
      background: rgba(18, 25, 32, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }
    /* 指标卡片 */
    .metric-card {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 24px;
      padding: 12px 8px;
      border: 1px solid #2a3f4e;
      box-shadow: inset 0 1px 3px #1f2e38, 0 6px 0 #0b141a;
    }
    /* 进度条 */
    .progress-track {
      background: #1a2a33;
      border-radius: 20px;
      border: 1.5px solid #f6c445;
      box-shadow: inset 0 2px 5px black;
    }
    .progress-fill {
      background: linear-gradient(90deg, #fcd34d, #fbbf24);
      border-radius: 20px;
      box-shadow: 0 0 10px #fbbf24;
    }
    /* 忍者发光圆环 */
    .ninja-aura {
      background: radial-gradient(circle, rgba(0,180,255,0.15) 0%, rgba(0,100,200,0.3) 70%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 40px #00a6ff, 0 0 20px #0080ff inset;
      border: 2px solid #3ea0ff;
    }
    /* 底部导航高亮 */
    .nav-active {
      color: #fcd34d;
      border-top: 4px solid #fcd34d;
    }
    /* 3D 金币效果 */
    .coin-3d {
      filter: drop-shadow(0 8px 6px #00000080);
    }
  </style>
</head>
<body class="text-white">

<div class="w-full max-w-[420px] mx-auto glass-panel p-5 relative overflow-hidden">

  <!-- ===== TOP HEADER (左侧头像+用户名 / 右侧金色按钮) ===== -->
  <div class="flex items-center justify-between mb-5">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-full bg-gradient-to-br from-amber-400 to-green-700 border-2 border-yellow-400 shadow-lg flex items-center justify-center">
        <i class="fas fa-user-ninja text-2xl text-white"></i>
      </div>
      <div>
        <p class="font-bold text-base">CAESARWBAS</p>
        <p class="text-[11px] text-gray-300">Grandmaster · Lv.24</p>
      </div>
    </div>
    <button class="bg-black/40 backdrop-blur-sm px-4 py-2 rounded-full text-sm font-semibold border border-amber-500/60 text-amber-200 shadow-md flex items-center gap-1">
      <i class="fas fa-wallet text-amber-300"></i> TON
    </button>
  </div>

  <!-- ===== METRICS ROW (三个指标卡片) ===== -->
  <div class="grid grid-cols-3 gap-3 mb-6">
    <div class="metric-card text-center">
      <p class="text-[10px] text-amber-200/70 uppercase tracking-wider">Learn / Lap</p>
      <div class="flex items-center justify-center gap-1 mt-1">
        <i class="fas fa-coins text-yellow-400 text-xs"></i>
        <span class="text-xl font-black text-white">+12</span>
      </div>
    </div>
    <div class="metric-card text-center">
      <p class="text-[10px] text-amber-200/70 uppercase tracking-wider">Coins to Lv</p>
      <div class="flex items-center justify-center gap-1 mt-1">
        <i class="fas fa-coins text-yellow-400 text-xs"></i>
        <span class="text-xl font-black text-white">10M</span>
      </div>
    </div>
    <div class="metric-card text-center">
      <p class="text-[10px] text-amber-200/70 uppercase tracking-wider">Profit / h</p>
      <div class="flex items-center justify-center gap-1 mt-1">
        <i class="fas fa-coins text-yellow-400 text-xs"></i>
        <span class="text-xl font-black text-white">+417K</span>
      </div>
    </div>
  </div>

  <!-- ===== MAIN BALANCE DISPLAY (大号金币 + 余额) ===== -->
  <div class="flex flex-col items-center mb-2">
    <div class="coin-3d text-7xl mb-1">🪙</div>
    <div class="text-6xl font-extrabold text-white drop-shadow-2xl font-mono tracking-tight">
      7,133
    </div>
    <p class="text-xs text-gray-400 mt-1">≈ $NNJA</p>
  </div>

  <!-- ===== PROGRESS SECTION (Rank / Level 进度) ===== -->
  <div class="mb-5">
    <div class="flex justify-between text-xs mb-1">
      <span class="text-gray-300">Rank · Grandmaster</span>
      <span class="text-gray-300">Level 5/10</span>
    </div>
    <div class="progress-track w-full h-3">
      <div class="progress-fill h-full" style="width: 50%;"></div>
    </div>
  </div>

  <!-- ===== CENTER STAGE AREA (发光圆环 + 忍者) ===== -->
  <div class="relative flex justify-center items-center my-4">
    <!-- 发光圆环背景 -->
    <div class="ninja-aura w-64 h-64 absolute"></div>
    <!-- 忍者角色 (替换为你的图片) -->
    <div class="relative z-10 w-40 h-48 flex items-center justify-center">
      <div class="w-36 h-36 rounded-full bg-gradient-to-b from-amber-300 via-orange-500 to-amber-800 border-[5px] border-yellow-300 shadow-[0_0_60px_orange] flex items-center justify-center">
        <i class="fas fa-user-ninja text-[100px] text-gray-900 drop-shadow-2xl"></i>
      </div>
    </div>
  </div>

  <!-- ===== ENERGY & BOOST ROW (能量 / Boost) ===== -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-2">
      <i class="fas fa-bolt text-orange-400 text-xl"></i>
      <span class="text-base font-bold">359 / 5000</span>
    </div>
    <button class="bg-yellow-600/80 hover:bg-yellow-500 text-white font-bold px-5 py-2 rounded-full text-sm shadow-md border border-yellow-300/50 flex items-center gap-1">
      <i class="fas fa-rocket"></i> Boost
    </button>
  </div>

  <!-- ===== 主操作按钮 (START MINING / 开始游戏) ===== -->
  <div class="flex justify-center mb-6">
    <button id="mainActionBtn" class="bg-gradient-to-r from-yellow-500 to-amber-500 text-black font-extrabold py-4 px-10 rounded-full text-xl shadow-[0_12px_0_#b45309,0_0_20px_#fbbf24] border-2 border-yellow-200 active:translate-y-[6px] active:shadow-[0_6px_0_#b45309,0_0_25px_#fbbf24] transition-all flex items-center gap-2">
      <i class="fas fa-gamepad"></i> START MINING <i class="fas fa-pickaxe"></i>
    </button>
  </div>

  <!-- ===== BOTTOM NAVIGATION BAR ===== -->
  <div class="flex justify-around items-end pt-4 border-t border-white/15 text-gray-400">
    <div class="flex flex-col items-center text-yellow-300 nav-active pb-1">
      <i class="fas fa-pickaxe text-2xl"></i>
      <span class="text-[11px] font-bold mt-1">Mine</span>
    </div>
    <div class="flex flex-col items-center">
      <i class="fas fa-users text-2xl"></i>
      <span class="text-[11px] font-bold mt-1">Friends</span>
    </div>
    <div class="flex flex-col items-center">
      <i class="fas fa-tasks text-2xl"></i>
      <span class="text-[11px] font-bold mt-1">Tasks</span>
    </div>
    <div class="flex flex-col items-center">
      <i class="fas fa-coins text-2xl"></i>
      <span class="text-[11px] font-bold mt-1">Earn</span>
    </div>
    <div class="flex flex-col items-center">
      <i class="fas fa-gift text-2xl"></i>
      <span class="text-[11px] font-bold mt-1">Airdrop</span>
    </div>
  </div>
</div>

<script>
  (function(){
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    document.getElementById('mainActionBtn').addEventListener('click', () => {
      // 连接到你的游戏 (切片游戏或挖矿视图)
      alert('🚀 启动 Ninja Slicer 游戏！(在此集成你的游戏)');
    });

    // 底部导航点击切换高亮 (演示)
    const navItems = document.querySelectorAll('.flex-col.items-center');
    navItems.forEach(item => {
      item.addEventListener('click', function() {
        navItems.forEach(n => {
          n.classList.remove('text-yellow-300', 'nav-active');
          n.classList.add('text-gray-400');
        });
        this.classList.add('text-yellow-300', 'nav-active');
        this.classList.remove('text-gray-400');
      });
    });
  })();
</script>
</body>
</html>
