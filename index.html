<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <title>⚡ MODULAR SLICER ⚡ | PC Ninja</title>
  <style>
    /* ----- RESET & BASE (under 100 lines) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #050a10;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Courier New', monospace;
      padding: 8px;
    }
    .game-container {
      background: #0a0f1a;
      border-radius: 1.8rem;
      padding: 12px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.9), 0 0 0 2px #1e2a3a inset, 0 0 20px #00aaff40;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 0 0 1px #2a3a50, 0 10px 25px #00000080, 0 0 30px #00aaff30;
      touch-action: none;
      cursor: crosshair;
      aspect-ratio: 1000 / 650;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin: 14px 6px 4px 6px;
      color: #b7e4ff;
      text-shadow: 0 0 8px #00c8ff, 0 0 18px #0044ff;
      font-weight: 600;
      letter-spacing: 0.5px;
      gap: 8px;
    }
    .score-timer {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .score-board, .timer-board {
      font-family: 'Courier New', monospace;
      background: #0e1a26c0;
      padding: 6px 18px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid #3e6d9c;
      box-shadow: 0 0 15px #0050b0 inset, 0 4px 6px #00000060;
      color: #e2f2ff;
      white-space: nowrap;
    }
    .score-board { font-size: clamp(1.6rem, 8vw, 2.2rem); }
    .timer-board {
      font-size: clamp(1.4rem, 7vw, 2rem);
      border-color: #f0b37b;
      box-shadow: 0 0 15px #ff8c00 inset, 0 4px 6px #00000060;
      color: #ffe5b4;
    }
    .hint {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      background: #0e1a26b0;
      padding: 6px 14px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      border: 1px solid #3e6d9c;
      flex-wrap: wrap;
    }
    button {
      background: #162b3c;
      border: none;
      color: #d0ecff;
      font-weight: bold;
      font-size: clamp(0.9rem, 4vw, 1.1rem);
      padding: 8px 18px;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 4px 0 #0a141c, 0 0 10px #0088ff80;
      border: 1px solid #3f8db0;
      transition: 0.15s;
      font-family: inherit;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    button:hover { background: #1e405a; box-shadow: 0 2px 0 #0a141c, 0 0 16px #2aa0ff; transform: translateY(2px); color: white; }
    button:active { transform: translateY(4px); box-shadow: 0 0 0 #0a141c, 0 0 20px #00aaff; }
    button:disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.5); }
    .legend {
      display: flex;
      gap: 8px;
      font-size: 0.75rem;
      color: #9dc6e0;
      margin-left: 4px;
    }
    .legend span::before { content: "●"; margin-right: 3px; font-size: 1rem; vertical-align: middle; }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="1000" height="650"></canvas>
  <div class="status-bar">
    <div class="score-timer">
      <div class="score-board"><span>🔪</span> <span id="scoreDisplay">0000</span></div>
      <div class="timer-board"><span>⏳</span> <span id="timerDisplay">60</span>s</div>
    </div>
    <div class="hint">
      <div class="legend">
        <span style="color:#76b900;">GPU</span>
        <span style="color:#0071c5;">CPU</span>
        <span style="color:#f7b731;">RAM</span>
        <span style="color:#b983ff;">MB</span>
      </div>
      <button id="mainButton">▶ START</button>
    </div>
  </div>
</div>

<script>
  // ---------- MODULE 1: STORAGE MANAGER (cooldown) ---------- ~30 lines
  const StorageManager = (() => {
    const KEY = 'pcSlicerCooldown';
    let cooldownEnd = 0;
    
    function load() {
      const stored = localStorage.getItem(KEY);
      cooldownEnd = stored ? parseInt(stored, 10) : 0;
    }
    function save(timestamp) { cooldownEnd = timestamp; localStorage.setItem(KEY, timestamp); }
    function isInCooldown() { return Date.now() < cooldownEnd; }
    function getRemainingSeconds() {
      if (!isInCooldown()) return 0;
      return Math.ceil((cooldownEnd - Date.now()) / 1000);
    }
    function formatCooldown(sec) {
      if (sec <= 0) return '';
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      return `${h}h ${m}m ${s}s`;
    }
    // Set a 6-hour cooldown from now
    function setSixHourCooldown() {
      save(Date.now() + 6 * 60 * 60 * 1000);
    }
    load();
    return { isInCooldown, getRemainingSeconds, formatCooldown, save, setSixHourCooldown };
  })();

  // ---------- MODULE 2: TIMER MANAGER (session countdown) ---------- ~40 lines
  const TimerManager = (() => {
    let interval = null;
    let onTick = null, onFinish = null;
    let timeLeft = 60;
    
    function start(initialSec, tickCb, finishCb) {
      stop();
      timeLeft = initialSec;
      onTick = tickCb;
      onFinish = finishCb;
      interval = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          if (onTick) onTick(timeLeft);
          if (timeLeft === 0 && onFinish) onFinish();
        } else {
          stop();
        }
      }, 1000);
    }
    function stop() { if (interval) { clearInterval(interval); interval = null; } }
    function getTimeLeft() { return timeLeft; }
    return { start, stop, getTimeLeft };
  })();

  // ---------- MODULE 3: GAME STATE & COMPONENT SPAWN ---------- ~70 lines
  const GameState = (() => {
    const CW = 1000, CH = 650;
    const GRAVITY = 0.2, SPAWN_INTERVAL = 580, MAX_COMP = 45, RADIUS = 34;
    const TYPES = [
      { name: 'GPU', label: 'GPU', color: '#76b900', textColor: '#fff', glow: '#a4e040' },
      { name: 'CPU', label: 'CPU', color: '#0071c5', textColor: '#fff', glow: '#3ea0ff' },
      { name: 'RAM', label: 'RAM', color: '#f7b731', textColor: '#1e1e1e', glow: '#ffd966' },
      { name: 'MB',  label: 'MB',  color: '#9b59b6', textColor: '#fff', glow: '#d9a6ff' }
    ];
    
    let components = [];
    let score = 0;
    let sessionActive = false;
    let gameActive = false;
    let lastSpawn = 0;
    
    function reset() {
      components = [];
      score = 0;
      sessionActive = false;
      gameActive = false;
    }
    function startSession() {
      sessionActive = true;
      gameActive = true;
      components = [];
      score = 0;
      for (let i=0; i<4; i++) spawn();
      lastSpawn = performance.now();
    }
    function endSession() { sessionActive = false; gameActive = false; }
    function spawn() {
      if (!gameActive || components.length >= MAX_COMP) return;
      const t = TYPES[Math.floor(Math.random() * TYPES.length)];
      const x = Math.random() * (CW - 2*RADIUS) + RADIUS;
      const y = CH - RADIUS - 2;
      const vx = (Math.random()-0.5)*3.2;
      const vy = -8.5 - Math.random()*5.5;
      components.push({
        x, y, vx, vy, radius: RADIUS, type: t.name, label: t.label,
        color: t.color, textColor: t.textColor, glow: t.glow,
        rotation: Math.random()*Math.PI*2, spin: (Math.random()-0.5)*0.03
      });
    }
    function updatePhysics() {
      if (!gameActive) return;
      for (let i=components.length-1; i>=0; i--) {
        const c = components[i];
        c.x += c.vx; c.y += c.vy; c.vy += GRAVITY; c.rotation += c.spin;
        const m = c.radius+20;
        if (c.x+c.radius<0 || c.x-c.radius>CW || c.y-c.radius>CH+m || c.y+c.radius<-m) {
          components.splice(i,1);
        }
      }
    }
    function sliceAt(px, py) {
      if (!gameActive) return false;
      let sliced = false;
      for (let i=components.length-1; i>=0; i--) {
        const c = components[i];
        if (Math.hypot(px-c.x, py-c.y) <= c.radius) {
          components.splice(i,1);
          score += 10;
          sliced = true;
        }
      }
      return sliced;
    }
    function shouldSpawn(now) {
      if (!gameActive) return false;
      if (!lastSpawn) lastSpawn = now;
      if (now - lastSpawn > SPAWN_INTERVAL) { lastSpawn = now; return true; }
      return false;
    }
    return {
      get components() { return components; },
      get score() { return score; },
      get sessionActive() { return sessionActive; },
      get gameActive() { return gameActive; },
      reset, startSession, endSession, spawn, updatePhysics, sliceAt, shouldSpawn,
      setLastSpawn: (t) => { lastSpawn = t; },
      CW, CH, RADIUS
    };
  })();

  // ---------- MODULE 4: RENDERER (drawing) ---------- ~140 lines
  const Renderer = (() => {
    const { CW, CH } = GameState;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function shadeColor(col, p) {
      let R = parseInt(col.slice(1,3),16), G = parseInt(col.slice(3,5),16), B = parseInt(col.slice(5,7),16);
      R = Math.min(255, Math.max(0, R+p)); G = Math.min(255, Math.max(0, G+p)); B = Math.min(255, Math.max(0, B+p));
      return `#${((1<<24)+(R<<16)+(G<<8)+B).toString(16).slice(1)}`;
    }
    
    function drawBackground() {
      const grad = ctx.createLinearGradient(0,0,CW*0.8,CH);
      grad.addColorStop(0,'#0a111c'); grad.addColorStop(0.7,'#121e2c');
      ctx.fillStyle = grad; ctx.fillRect(0,0,CW,CH);
      ctx.strokeStyle = '#1a3550'; ctx.lineWidth=0.8;
      ctx.beginPath();
      for (let i=0; i<=CW; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,CH); }
      for (let i=0; i<=CH; i+=40) { ctx.moveTo(0,i); ctx.lineTo(CW,i); }
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,CH-2); ctx.lineTo(CW,CH-2);
      ctx.strokeStyle='#00b8ff'; ctx.lineWidth=3; ctx.shadowColor='#00c8ff'; ctx.shadowBlur=18; ctx.stroke();
      ctx.shadowBlur=0; ctx.fillStyle='#00aaff08'; ctx.fillRect(0,0,CW,CH);
    }
    
    function drawComponent(c) {
      ctx.shadowColor=c.glow; ctx.shadowBlur=22;
      const grad = ctx.createRadialGradient(c.x-8,c.y-8,5,c.x,c.y,c.radius+5);
      grad.addColorStop(0,c.color); grad.addColorStop(0.8,shadeColor(c.color,-25));
      ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(c.x,c.y,c.radius,0,2*Math.PI); ctx.fill();
      ctx.shadowBlur=12; ctx.strokeStyle='#e0f0ff'; ctx.lineWidth=3.5;
      ctx.beginPath(); ctx.arc(c.x,c.y,c.radius-1,0,2*Math.PI); ctx.stroke();
      ctx.shadowBlur=8; ctx.strokeStyle='#ffffff90'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.arc(c.x,c.y,c.radius-5,0,2*Math.PI); ctx.stroke();
      ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rotation); ctx.shadowBlur=10; ctx.strokeStyle='#d0e8ff'; ctx.lineWidth=2.5;
      for (let i=0;i<4;i++) {
        const a=i*Math.PI/2, dx=Math.cos(a)*(c.radius-9), dy=Math.sin(a)*(c.radius-9);
        ctx.beginPath(); ctx.moveTo(dx-4,dy-4); ctx.lineTo(dx+4,dy+4); ctx.moveTo(dx+4,dy-4); ctx.lineTo(dx-4,dy+4); ctx.stroke();
      }
      ctx.restore();
      ctx.shadowBlur=14; ctx.shadowColor='#00000090'; ctx.font='bold 15px "Segoe UI", monospace';
      ctx.fillStyle=c.textColor; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(c.label,c.x,c.y-2);
      ctx.font='bold 9px "Courier New", monospace'; ctx.fillStyle='#ddd'; ctx.shadowBlur=8;
      ctx.fillText(c.type==='GPU'?'RTX':(c.type==='CPU'?'CORE':''),c.x,c.y+14);
      ctx.shadowBlur=0; ctx.shadowColor='transparent';
    }
    
    function drawOverlay(sessionActive) {
      if (sessionActive) return;
      ctx.fillStyle='#000000b0'; ctx.fillRect(0,0,CW,CH);
      ctx.shadowColor='#00aaff'; ctx.shadowBlur=30; ctx.fillStyle='#0e1a26f0'; ctx.strokeStyle='#3e9bd6'; ctx.lineWidth=4;
      ctx.beginPath(); roundRect(CW/2-170, CH/2-70, 340, 140, 30); ctx.fill(); ctx.stroke();
      ctx.font='bold 28px "Segoe UI", monospace'; ctx.fillStyle='#fff'; ctx.shadowColor='#00aaff'; ctx.textAlign='center';
      const inCooldown = StorageManager.isInCooldown();
      if (inCooldown) {
        ctx.fillText('⌛ COOLDOWN ⌛', CW/2, CH/2-15);
        ctx.font='bold 22px monospace'; ctx.fillText(StorageManager.formatCooldown(StorageManager.getRemainingSeconds()), CW/2, CH/2+25);
      } else {
        ctx.fillText('⚡ READY ⚡', CW/2, CH/2-15);
        ctx.font='bold 20px monospace'; ctx.fillText('Press START to slice!', CW/2, CH/2+25);
      }
      ctx.shadowBlur=0;
    }
    
    function roundRect(x,y,w,h,r) {
      if (w<2*r) r=w/2; if (h<2*r) r=h/2;
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    }
    
    function drawSliceIndicator(active) {
      if (!active) return;
      ctx.beginPath(); ctx.arc(30,CH-30,16,0,2*Math.PI); ctx.fillStyle='#ff3366'; ctx.shadowColor='#ff0055'; ctx.shadowBlur=30; ctx.fill();
      ctx.shadowBlur=0; ctx.font='bold 20px "Segoe UI"'; ctx.fillStyle='white'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=16;
      ctx.fillText('⚡',18,CH-22); ctx.shadowBlur=0;
    }
    
    function render(components, sessionActive, gameActive, slicingActive) {
      drawBackground();
      components.forEach(drawComponent);
      drawSliceIndicator(slicingActive && gameActive);
      drawOverlay(sessionActive);
      if (gameActive && components.length===0) {
        ctx.font='bold 18px "Courier New", monospace'; ctx.fillStyle='#b0daff'; ctx.shadowColor='#0088ff'; ctx.shadowBlur=14;
        ctx.textAlign='center'; ctx.fillText('⟳  DRAG TO SLICE  ⟳', CW/2, CH/2+30); ctx.shadowBlur=0;
      }
    }
    return { render };
  })();

  // ---------- MODULE 5: INPUT HANDLER ---------- ~60 lines
  const InputHandler = (() => {
    const canvas = document.getElementById('gameCanvas');
    const { CW, CH } = GameState;
    let slicingActive = false;
    
    function getCoords(e) {
      const rect = canvas.getBoundingClientRect();
      let cx, cy;
      if (e.touches) {
        if (!e.touches.length) return null;
        cx = e.touches[0].clientX; cy = e.touches[0].clientY;
      } else { cx = e.clientX; cy = e.clientY; }
      const rx = (cx - rect.left) / rect.width, ry = (cy - rect.top) / rect.height;
      return { x: Math.min(CW, Math.max(0, rx*CW)), y: Math.min(CH, Math.max(0, ry*CH)) };
    }
    
    function onStart(e) {
      e.preventDefault();
      if (!GameState.gameActive) return;
      slicingActive = true;
      const p = getCoords(e); if (p) GameState.sliceAt(p.x, p.y);
    }
    function onMove(e) {
      e.preventDefault();
      if (!slicingActive || !GameState.gameActive) return;
      const p = getCoords(e); if (p) GameState.sliceAt(p.x, p.y);
    }
    function onEnd(e) { e.preventDefault(); slicingActive = false; }
    function onLeave() { slicingActive = false; }
    
    function bind() {
      canvas.addEventListener('mousedown', onStart);
      canvas.addEventListener('mousemove', onMove);
      canvas.addEventListener('mouseup', onEnd);
      canvas.addEventListener('mouseleave', onLeave);
      canvas.addEventListener('touchstart', onStart, {passive:false});
      canvas.addEventListener('touchmove', onMove, {passive:false});
      canvas.addEventListener('touchend', onEnd);
      canvas.addEventListener('touchcancel', onEnd);
      canvas.addEventListener('contextmenu', e=>e.preventDefault());
    }
    return { bind, get slicingActive() { return slicingActive; } };
  })();

  // ---------- MODULE 6: UI CONTROLLER (score, timer display, button) ---------- ~70 lines
  const UIController = (() => {
    const scoreSpan = document.getElementById('scoreDisplay');
    const timerSpan = document.getElementById('timerDisplay');
    const mainBtn = document.getElementById('mainButton');
    
    function updateScore(score) {
      let s = String(score).padStart(4,'0').slice(0,4);
      if (score>9999) s='9999+';
      scoreSpan.textContent = s;
    }
    function updateTimer(sec) { timerSpan.textContent = sec; }
    
    function updateButton(sessionActive) {
      if (sessionActive) {
        mainBtn.textContent = '← BACK';
        mainBtn.disabled = false;
      } else {
        if (StorageManager.isInCooldown()) {
          const r = StorageManager.getRemainingSeconds();
          mainBtn.textContent = `⏳ ${StorageManager.formatCooldown(r)}`;
          mainBtn.disabled = true;
        } else {
          mainBtn.textContent = '▶ START';
          mainBtn.disabled = false;
        }
      }
    }
    
    function onButtonClick(handler) {
      mainBtn.addEventListener('click', handler);
    }
    
    // periodic cooldown UI update
    setInterval(() => {
      if (!GameState.sessionActive) updateButton(false);
    }, 1000);
    
    return { updateScore, updateTimer, updateButton, onButtonClick };
  })();

  // ---------- MODULE 7: GAME LOOP & BOOTSTRAP ---------- ~80 lines
  (function main() {
    InputHandler.bind();
    
    UIController.updateScore(0);
    UIController.updateTimer(60);
    UIController.updateButton(false);
    
    // Decorative preview components
    for (let i=0; i<3; i++) GameState.spawn();
    
    function handleSessionEnd(setCooldown = true) {
      GameState.endSession();
      TimerManager.stop();
      if (setCooldown) {
        StorageManager.setSixHourCooldown();
      }
      UIController.updateButton(false);
    }
    
    function onTimerTick(sec) {
      UIController.updateTimer(sec);
    }
    
    function onTimerFinish() {
      // Time's up – set cooldown
      handleSessionEnd(true);
    }
    
    UIController.onButtonClick(() => {
      if (GameState.sessionActive) {
        // BACK button: end session AND trigger 6-hour cooldown
        handleSessionEnd(true);
      } else {
        if (!StorageManager.isInCooldown()) {
          GameState.startSession();
          TimerManager.start(60, onTimerTick, onTimerFinish);
          UIController.updateScore(0);
          UIController.updateTimer(60);
          UIController.updateButton(true);
        }
      }
    });
    
    function loop(now) {
      if (GameState.gameActive) {
        if (GameState.shouldSpawn(now)) GameState.spawn();
        GameState.updatePhysics();
        UIController.updateScore(GameState.score);
      }
      Renderer.render(
        GameState.components,
        GameState.sessionActive,
        GameState.gameActive,
        InputHandler.slicingActive
      );
      requestAnimationFrame(loop);
    }
    
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
