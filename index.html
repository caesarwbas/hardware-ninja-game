<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ NNJA · Hardware Ninja ⚡</title>
  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* custom glass & gold accents */
    body {
      background: radial-gradient(circle at 20% 20%, #1a2a1f, #0b0f0a);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    .glass-card {
      background: rgba(20, 30, 20, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
    }
    .gold-text {
      background: linear-gradient(135deg, #f9e076, #e4b300);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .btn-gold {
      background: linear-gradient(145deg, #e4b300, #b58d00);
      border: none;
      box-shadow: 0 6px 0 #7a5c00, 0 0 15px #ffd966;
    }
    .btn-gold:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #7a5c00, 0 0 20px #ffd966;
    }
    .nav-circle {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(228, 179, 0, 0.6);
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
      transition: all 0.15s;
    }
    .nav-circle:active {
      transform: scale(0.92);
      border-color: #f9e076;
    }
    /* Floating animation for ninja */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>
<body class="text-white">

<!-- Unified container -->
<div class="w-full max-w-[420px] mx-auto glass-card rounded-3xl p-4 shadow-2xl relative overflow-hidden">

  <!-- ==================== TOP BAR (Clash Royale style) ==================== -->
  <div class="flex items-center justify-between mb-2">
    <!-- Profile & Level -->
    <div class="flex items-center gap-2 bg-black/30 backdrop-blur-sm px-3 py-1.5 rounded-full border border-amber-500/40">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center border-2 border-amber-300/60">
        <i class="fas fa-user-ninja text-lg text-white"></i>
      </div>
      <div>
        <p class="text-xs font-bold gold-text">Caesar</p>
        <p class="text-[10px] text-amber-200/80">Lvl. 42</p>
      </div>
    </div>

    <!-- Score & Upgrade Lap -->
    <div class="flex items-center gap-1">
      <div class="bg-black/30 backdrop-blur-sm px-3 py-1.5 rounded-full border border-blue-400/40 flex items-center gap-1">
        <i class="fas fa-star text-blue-300 text-xs"></i>
        <span class="text-sm font-bold text-blue-200">15.4k</span>
      </div>
      <div class="bg-black/30 backdrop-blur-sm px-3 py-1.5 rounded-full border border-purple-400/40 flex items-center gap-1">
        <i class="fas fa-microchip text-purple-300 text-xs"></i>
        <span class="text-sm font-bold text-purple-200">Lap 3</span>
      </div>
    </div>

    <!-- Wallet -->
    <div class="bg-black/30 backdrop-blur-sm px-3 py-1.5 rounded-full border border-amber-500/40 flex items-center gap-1">
      <i class="fas fa-wallet text-amber-300 text-xs"></i>
      <span class="text-sm font-bold gold-text">TON</span>
    </div>
  </div>

  <!-- ==================== CENTRAL NINJA CHARACTER ==================== -->
  <div class="relative flex flex-col items-center justify-center my-4">
    <!-- Circular background aura -->
    <div class="absolute w-48 h-48 rounded-full bg-amber-500/10 blur-3xl"></div>
    
    <!-- Ninja Image (Replace with your actual asset) -->
    <div class="relative z-10 animate-float">
      <div class="w-40 h-40 rounded-full bg-gradient-to-b from-amber-900/40 to-yellow-900/20 border-4 border-amber-400/50 shadow-[0_0_40px_rgba(228,179,0,0.3)] flex items-center justify-center">
        <i class="fas fa-user-ninja text-8xl gold-text drop-shadow-2xl"></i>
      </div>
    </div>

    <!-- Circular Navigation Tabs (Left & Right) -->
    <!-- Left side circles -->
    <div class="absolute left-0 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-20">
      <div class="nav-circle w-14 h-14 rounded-full flex items-center justify-center cursor-pointer" onclick="alert('Mine Tab')">
        <i class="fas fa-pickaxe text-2xl text-amber-300"></i>
      </div>
      <div class="nav-circle w-14 h-14 rounded-full flex items-center justify-center cursor-pointer" onclick="alert('Tasks Tab')">
        <i class="fas fa-tasks text-2xl text-blue-300"></i>
      </div>
    </div>

    <!-- Right side circles -->
    <div class="absolute right-0 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-20">
      <div class="nav-circle w-14 h-14 rounded-full flex items-center justify-center cursor-pointer" onclick="alert('Friends Tab')">
        <i class="fas fa-users text-2xl text-green-300"></i>
      </div>
      <div class="nav-circle w-14 h-14 rounded-full flex items-center justify-center cursor-pointer" onclick="alert('Airdrop Tab')">
        <i class="fas fa-gift text-2xl text-purple-300"></i>
      </div>
    </div>
  </div>

  <!-- ==================== START GAME BUTTON ==================== -->
  <div class="flex justify-center mb-4">
    <button id="playSlicerBtn" class="btn-gold text-black font-bold py-4 px-10 rounded-full text-xl shadow-2xl flex items-center gap-3 transform transition active:scale-95">
      <i class="fas fa-gamepad"></i> START GAME
    </button>
  </div>

  <!-- ==================== BOTTOM DASHBOARD (Stats / Mine Cards) ==================== -->
  <div class="mt-2 space-y-3">
    <!-- Stats row -->
    <div class="flex justify-around text-center text-xs">
      <div class="glass-card rounded-xl px-4 py-2">
        <p class="text-gray-400">Win Rate</p>
        <p class="text-lg font-bold text-green-300">68%</p>
      </div>
      <div class="glass-card rounded-xl px-4 py-2">
        <p class="text-gray-400">Best Score</p>
        <p class="text-lg font-bold text-yellow-300">2.4k</p>
      </div>
      <div class="glass-card rounded-xl px-4 py-2">
        <p class="text-gray-400">Rank</p>
        <p class="text-lg font-bold text-blue-300">#42</p>
      </div>
    </div>

    <!-- Upgrade cards preview (Mine Tab content) -->
    <div class="glass-card rounded-2xl p-3">
      <h4 class="text-sm font-bold gold-text mb-2 flex items-center gap-1"><i class="fas fa-microchip"></i> Active Miners</h4>
      <div class="flex gap-2 overflow-x-auto pb-1">
        <div class="min-w-[100px] bg-black/30 rounded-xl p-2 border border-amber-500/30">
          <i class="fas fa-microchip text-blue-300"></i>
          <p class="text-xs font-bold">CPU Lvl 2</p>
          <p class="text-[10px] text-gray-400">+150/hr</p>
        </div>
        <div class="min-w-[100px] bg-black/30 rounded-xl p-2 border border-amber-500/30">
          <i class="fas fa-tv text-green-300"></i>
          <p class="text-xs font-bold">GPU Lvl 1</p>
          <p class="text-[10px] text-gray-400">+220/hr</p>
        </div>
        <div class="min-w-[100px] bg-black/30 rounded-xl p-2 border border-amber-500/30">
          <i class="fas fa-memory text-purple-300"></i>
          <p class="text-xs font-bold">RAM Lvl 3</p>
          <p class="text-[10px] text-gray-400">+80/hr</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden Game View (will be shown when START GAME is clicked) -->
  <div id="gameView" class="hidden">
    <!-- Game view content would go here, you can integrate your existing slicer game -->
  </div>
</div>

<script>
  (function(){
    // Telegram Mini App integration
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    // Placeholder for your existing game logic
    document.getElementById('playSlicerBtn').addEventListener('click', () => {
      // You can replace this with your actual game launch logic
      // For example, switching views or opening the game iframe
      alert('🚀 Launching Hardware Ninja Slicer! (Integrate your game view here)');
      
      // Example: if you want to hide dashboard and show game canvas
      // document.getElementById('dashboardView').classList.add('hidden');
      // document.getElementById('gameView').classList.remove('hidden');
    });

    // Update Telegram user info if available
    if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
      const user = window.Telegram.WebApp.initDataUnsafe.user;
      const usernameEl = document.querySelector('.gold-text');
      if (usernameEl) usernameEl.textContent = user.first_name || 'Caesar';
    }
  })();
</script>

<!-- Add a subtle style for the hidden view -->
<style>
  .hidden { display: none !important; }
</style>
</body>
</html>
