<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ Ninja KumBI · Slicer + TON ⚡</title>
  <!-- Tailwind + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- TON Connect UI -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    /* 全局暗色风格 + 游戏画布样式 */
    body {
      background: #0a0e13;
      background-image: radial-gradient(circle at 50% 0%, #3a2c1a 0%, #0a0e13 60%);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      margin: 0;
    }
    .glass-panel {
      background: rgba(18, 25, 32, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      padding: 20px;
    }
    .metric-card {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 24px;
      padding: 12px 8px;
      border: 1px solid #2a3f4e;
      box-shadow: inset 0 1px 3px #1f2e38, 0 6px 0 #0b141a;
    }
    .progress-track {
      background: #1a2a33;
      border-radius: 20px;
      border: 1.5px solid #f6c445;
      box-shadow: inset 0 2px 5px black;
    }
    .progress-fill {
      background: linear-gradient(90deg, #fcd34d, #fbbf24);
      border-radius: 20px;
      box-shadow: 0 0 10px #fbbf24;
    }
    .ninja-aura {
      background: radial-gradient(circle, rgba(0,180,255,0.15) 0%, rgba(0,100,200,0.3) 70%, transparent 100%);
      border-radius: 50%;
      box-shadow: 0 0 40px #00a6ff, 0 0 20px #0080ff inset;
      border: 2px solid #3ea0ff;
    }
    .nav-active {
      color: #fcd34d;
      border-top: 4px solid #fcd34d;
    }
    .coin-3d {
      filter: drop-shadow(0 8px 6px #00000080);
    }
    /* 游戏画布容器 */
    .game-canvas-wrapper {
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 0 2px #2a4a60, 0 15px 25px black;
    }
    /* 视图切换 */
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }
    /* TON Connect 按钮自定义样式 */
    #tonConnectBtn {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      transition: all 0.15s;
    }
    #tonConnectBtn:hover {
      background: rgba(30,40,50,0.7);
    }
  </style>
</head>
<body class="text-white">

<div class="w-full max-w-[450px] mx-auto">
  <!-- ==================== 仪表板视图 ==================== -->
  <div id="dashboard-view" class="view active glass-panel">
    <!-- 头部 -->
    <div class="flex items-center justify-between mb-5">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-amber-400 to-green-700 border-2 border-yellow-400 shadow-lg flex items-center justify-center">
          <i class="fas fa-user-ninja text-2xl text-white"></i>
        </div>
        <div>
          <p class="font-bold text-base">CAESARWBAS</p>
          <p class="text-[11px] text-gray-300">Grandmaster · Lv.24</p>
        </div>
      </div>
      <!-- TON 连接按钮 (替换原来的静态按钮) -->
      <button id="tonConnectBtn" class="px-4 py-2 rounded-full text-sm font-semibold border border-amber-500/60 text-amber-200 shadow-md flex items-center gap-1">
        <i class="fas fa-wallet text-amber-300"></i> <span id="tonBtnText">TON</span>
      </button>
    </div>

    <!-- 三指标卡片 -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="metric-card text-center">
        <p class="text-[10px] text-amber-200/70 uppercase tracking-wider">Learn / Lap</p>
        <div class="flex items-center justify-center gap-1 mt-1">
          <i class="fas fa-coins text-yellow-400 text-xs"></i>
          <span class="text-xl font-black text-white">+12</span>
        </div>
      </div>
      <div class="metric-card text-center">
        <p class="text-[10px] text-amber-200/70 uppercase tracking-wider">Coins to Lv</p>
        <div class="flex items-center justify-center gap-1 mt-1">
          <i class="fas fa-coins text-yellow-400 text-xs"></i>
          <span class="text-xl font-black text-white">10M</span>
        </div>
      </div>
      <div class="metric-card text-center">
        <p class="text-[10px] text-amber-200/70 uppercase tracking-wider">Profit / h</p>
        <div class="flex items-center justify-center gap-1 mt-1">
          <i class="fas fa-coins text-yellow-400 text-xs"></i>
          <span class="text-xl font-black text-white">+417K</span>
        </div>
      </div>
    </div>

    <!-- 主余额 (可更新) -->
    <div class="flex flex-col items-center mb-2">
      <div class="coin-3d text-7xl mb-1">🪙</div>
      <div class="text-6xl font-extrabold text-white drop-shadow-2xl font-mono tracking-tight" id="balanceDisplay">7,133</div>
      <p class="text-xs text-gray-400 mt-1">≈ $NNJA</p>
    </div>

    <!-- 进度条 -->
    <div class="mb-5">
      <div class="flex justify-between text-xs mb-1">
        <span class="text-gray-300">Rank · Grandmaster</span>
        <span class="text-gray-300">Level 5/10</span>
      </div>
      <div class="progress-track w-full h-3">
        <div class="progress-fill h-full" style="width: 50%;"></div>
      </div>
    </div>

    <!-- 中央发光忍者区 (静态装饰) -->
    <div class="relative flex justify-center items-center my-4">
      <div class="ninja-aura w-64 h-64 absolute"></div>
      <div class="relative z-10 w-40 h-48 flex items-center justify-center">
        <div class="w-36 h-36 rounded-full bg-gradient-to-b from-amber-300 via-orange-500 to-amber-800 border-[5px] border-yellow-300 shadow-[0_0_60px_orange] flex items-center justify-center">
          <i class="fas fa-user-ninja text-[100px] text-gray-900 drop-shadow-2xl"></i>
        </div>
      </div>
    </div>

    <!-- 能量 & Boost -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <i class="fas fa-bolt text-orange-400 text-xl"></i>
        <span class="text-base font-bold">359 / 5000</span>
      </div>
      <button class="bg-yellow-600/80 hover:bg-yellow-500 text-white font-bold px-5 py-2 rounded-full text-sm shadow-md border border-yellow-300/50 flex items-center gap-1">
        <i class="fas fa-rocket"></i> Boost
      </button>
    </div>

    <!-- 主按钮: 开始游戏 -->
    <div class="flex justify-center mb-6">
      <button id="startGameBtn" class="bg-gradient-to-r from-yellow-500 to-amber-500 text-black font-extrabold py-4 px-10 rounded-full text-xl shadow-[0_12px_0_#b45309,0_0_20px_#fbbf24] border-2 border-yellow-200 active:translate-y-[6px] active:shadow-[0_6px_0_#b45309,0_0_25px_#fbbf24] transition-all flex items-center gap-2">
        <i class="fas fa-gamepad"></i> START MINING <i class="fas fa-pickaxe"></i>
      </button>
    </div>

    <!-- 底部导航 -->
    <div class="flex justify-around items-end pt-4 border-t border-white/15 text-gray-400">
      <div class="flex flex-col items-center text-yellow-300 nav-active pb-1">
        <i class="fas fa-pickaxe text-2xl"></i>
        <span class="text-[11px] font-bold mt-1">Mine</span>
      </div>
      <div class="flex flex-col items-center">
        <i class="fas fa-users text-2xl"></i>
        <span class="text-[11px] font-bold mt-1">Friends</span>
      </div>
      <div class="flex flex-col items-center">
        <i class="fas fa-tasks text-2xl"></i>
        <span class="text-[11px] font-bold mt-1">Tasks</span>
      </div>
      <div class="flex flex-col items-center">
        <i class="fas fa-coins text-2xl"></i>
        <span class="text-[11px] font-bold mt-1">Earn</span>
      </div>
      <div class="flex flex-col items-center">
        <i class="fas fa-gift text-2xl"></i>
        <span class="text-[11px] font-bold mt-1">Airdrop</span>
      </div>
    </div>
  </div>

  <!-- ==================== 游戏视图 ==================== -->
  <div id="game-view" class="view glass-panel" style="padding: 12px;">
    <div class="flex justify-between items-center mb-3">
      <button id="backToDashboardBtn" class="bg-black/40 text-amber-200 px-4 py-2 rounded-full text-sm border border-amber-500/50">
        <i class="fas fa-arrow-left"></i> Dashboard
      </button>
      <div class="flex gap-3">
        <div class="bg-black/40 px-3 py-1 rounded-full text-sm"><span>🔪</span> <span id="gameScoreDisplay">0000</span></div>
        <div class="bg-black/40 px-3 py-1 rounded-full text-sm"><span>⏳</span> <span id="gameTimerDisplay">60</span>s</div>
      </div>
    </div>
    <div class="game-canvas-wrapper">
      <canvas id="gameCanvas" width="1000" height="650" style="width:100%; height:auto; display:block;"></canvas>
    </div>
    <p class="text-xs text-center text-gray-400 mt-2">Drag to slice · 10 pts per component</p>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- TON Connect 初始化 ----------
    const manifestUrl = 'https://caesarwbas.github.io/hardware-ninja-game/tonconnect-manifest.json';
    let tonConnectUI;

    function initTonConnect() {
      if (typeof TON_CONNECT_UI !== 'undefined') {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
          manifestUrl: manifestUrl,
          buttonRootId: null, // 我们手动控制，不使用内置按钮
        });
        // 恢复之前的连接
        tonConnectUI.connectionRestored.then(restored => {
          updateTonButtonState();
        });
        // 监听连接状态变化
        tonConnectUI.onStatusChange(() => {
          updateTonButtonState();
        });
      } else {
        console.warn('TON Connect UI library not loaded');
      }
    }

    function updateTonButtonState() {
      const btnText = document.getElementById('tonBtnText');
      if (!tonConnectUI) return;
      
      if (tonConnectUI.connected && tonConnectUI.wallet) {
        const address = tonConnectUI.wallet.account.address;
        const short = address.slice(0, 4) + '...' + address.slice(-4);
        btnText.textContent = short;
      } else {
        btnText.textContent = 'TON';
      }
    }

    async function handleTonConnect() {
      if (!tonConnectUI) {
        alert('TON Connect is initializing, please try again.');
        return;
      }
      if (tonConnectUI.connected) {
        // 如果已连接，可选择断开（这里简单起见，再次点击不自动断开，仅展示连接状态）
        // 但我们提供一个简单交互：长按或二次确认？为了友好，点击已连接按钮不做断开。
        // 如需断开功能可单独添加，这里仅演示连接。
        return;
      }
      try {
        await tonConnectUI.connectWallet();
      } catch (e) {
        console.error('Wallet connection error:', e);
      }
    }

    // 绑定 TON 按钮
    document.getElementById('tonConnectBtn').addEventListener('click', handleTonConnect);

    // ---------- 全局状态 ----------
    let userBalance = 7133;   // 仪表板余额 (初始)
    const balanceSpan = document.getElementById('balanceDisplay');

    // 更新仪表板余额显示
    function updateDashboardBalance() {
      balanceSpan.textContent = userBalance.toLocaleString();
    }
    updateDashboardBalance();

    // ---------- 视图切换 ----------
    const dashboardView = document.getElementById('dashboard-view');
    const gameView = document.getElementById('game-view');

    function showDashboard() {
      dashboardView.classList.add('active');
      gameView.classList.remove('active');
      if (gameLoopId) {
        cancelAnimationFrame(gameLoopId);
        gameLoopId = null;
      }
      gameActive = false;
      GameState.endSession();
      TimerManager.stop();
    }

    function showGame() {
      dashboardView.classList.remove('active');
      gameView.classList.add('active');
      gameActive = true;
    }

    // ---------- 游戏模块 (切片核心) ----------
    // 计时器
    const TimerManager = (() => {
      let interval = null;
      let onTick = null, onFinish = null;
      let timeLeft = 60;
      function start(sec, tickCb, finishCb) {
        stop();
        timeLeft = sec;
        onTick = tickCb;
        onFinish = finishCb;
        interval = setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--;
            if (onTick) onTick(timeLeft);
            if (timeLeft === 0 && onFinish) onFinish();
          } else {
            stop();
          }
        }, 1000);
      }
      function stop() { if (interval) { clearInterval(interval); interval = null; } }
      function getTimeLeft() { return timeLeft; }
      return { start, stop, getTimeLeft };
    })();

    // 游戏状态 (物理、生成、得分)
    const GameState = (() => {
      const CW = 1000, CH = 650;
      const GRAVITY = 0.2, SPAWN_INT = 580, MAX_COMP = 45, RAD = 34;
      const TYPES = [
        { name:'GPU', label:'GPU', color:'#76b900', textColor:'#fff', glow:'#a4e040' },
        { name:'CPU', label:'CPU', color:'#0071c5', textColor:'#fff', glow:'#3ea0ff' },
        { name:'RAM', label:'RAM', color:'#f7b731', textColor:'#1e1e1e', glow:'#ffd966' },
        { name:'MB',  label:'MB',  color:'#9b59b6', textColor:'#fff', glow:'#d9a6ff' }
      ];
      let components = [], score = 0, sessionActive = false, gameActive = false, lastSpawn = 0;

      function startSession() {
        sessionActive = true; gameActive = true; components = []; score = 0;
        for (let i=0; i<4; i++) spawn();
        lastSpawn = performance.now();
      }
      function endSession() { sessionActive = false; gameActive = false; }
      function spawn() {
        if (!gameActive || components.length >= MAX_COMP) return;
        const t = TYPES[Math.floor(Math.random() * TYPES.length)];
        const x = Math.random() * (CW - 2*RAD) + RAD;
        const y = CH - RAD - 2;
        const vx = (Math.random()-0.5)*3.2;
        const vy = -8.5 - Math.random()*5.5;
        components.push({ x, y, vx, vy, radius: RAD, type: t.name, label: t.label, color: t.color, textColor: t.textColor, glow: t.glow, rotation: Math.random()*Math.PI*2, spin: (Math.random()-0.5)*0.03 });
      }
      function updatePhysics() {
        if (!gameActive) return;
        for (let i=components.length-1; i>=0; i--) {
          const c = components[i];
          c.x += c.vx; c.y += c.vy; c.vy += GRAVITY; c.rotation += c.spin;
          const m = c.radius+20;
          if (c.x+c.radius<0 || c.x-c.radius>CW || c.y-c.radius>CH+m || c.y+c.radius<-m) components.splice(i,1);
        }
      }
      function sliceAt(px, py) {
        if (!gameActive) return false;
        let sliced = false;
        for (let i=components.length-1; i>=0; i--) {
          if (Math.hypot(px-components[i].x, py-components[i].y) <= components[i].radius) {
            components.splice(i,1);
            score += 10;
            sliced = true;
          }
        }
        return sliced;
      }
      function shouldSpawn(now) {
        if (!gameActive) return false;
        if (!lastSpawn) lastSpawn = now;
        if (now - lastSpawn > SPAWN_INT) { lastSpawn = now; return true; }
        return false;
      }
      return {
        components, get score() { return score; }, get sessionActive() { return sessionActive; }, get gameActive() { return gameActive; },
        startSession, endSession, spawn, updatePhysics, sliceAt, shouldSpawn,
        setLastSpawn: (t) => { lastSpawn = t; }, CW, CH, RADIUS: RAD
      };
    })();

    // 渲染器
    const Renderer = (() => {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const { CW, CH } = GameState;
      function shade(c, p) {
        let R = parseInt(c.slice(1,3),16), G = parseInt(c.slice(3,5),16), B = parseInt(c.slice(5,7),16);
        R = Math.min(255, Math.max(0, R+p)); G = Math.min(255, Math.max(0, G+p)); B = Math.min(255, Math.max(0, B+p));
        return `#${((1<<24)+(R<<16)+(G<<8)+B).toString(16).slice(1)}`;
      }
      function drawBg() {
        const grad = ctx.createLinearGradient(0, 0, CW*0.8, CH);
        grad.addColorStop(0, '#0a111c'); grad.addColorStop(0.7, '#121e2c');
        ctx.fillStyle = grad; ctx.fillRect(0,0,CW,CH);
        ctx.strokeStyle = '#1a3550'; ctx.lineWidth = 0.8;
        ctx.beginPath();
        for (let i=0; i<=CW; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,CH); }
        for (let i=0; i<=CH; i+=40) { ctx.moveTo(0,i); ctx.lineTo(CW,i); }
        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,CH-2); ctx.lineTo(CW,CH-2);
        ctx.strokeStyle = '#00b8ff'; ctx.lineWidth = 3; ctx.shadowColor='#00c8ff'; ctx.shadowBlur=18; ctx.stroke();
        ctx.shadowBlur=0; ctx.fillStyle = '#00aaff08'; ctx.fillRect(0,0,CW,CH);
      }
      function drawComponent(c) {
        ctx.shadowColor = c.glow; ctx.shadowBlur = 22;
        const grad = ctx.createRadialGradient(c.x-8, c.y-8, 5, c.x, c.y, c.radius+5);
        grad.addColorStop(0, c.color); grad.addColorStop(0.8, shade(c.color, -25));
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, 2*Math.PI); ctx.fill();
        ctx.shadowBlur = 12; ctx.strokeStyle = '#e0f0ff'; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.arc(c.x, c.y, c.radius-1, 0, 2*Math.PI); ctx.stroke();
        ctx.shadowBlur = 8; ctx.strokeStyle = '#ffffff90'; ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.arc(c.x, c.y, c.radius-5, 0, 2*Math.PI); ctx.stroke();
        ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.rotation);
        ctx.shadowBlur = 10; ctx.strokeStyle = '#d0e8ff'; ctx.lineWidth = 2.5;
        for (let i=0; i<4; i++) {
          const a = i*Math.PI/2, dx = Math.cos(a)*(c.radius-9), dy = Math.sin(a)*(c.radius-9);
          ctx.beginPath(); ctx.moveTo(dx-4, dy-4); ctx.lineTo(dx+4, dy+4); ctx.moveTo(dx+4, dy-4); ctx.lineTo(dx-4, dy+4); ctx.stroke();
        }
        ctx.restore();
        ctx.shadowBlur = 14; ctx.shadowColor = '#00000090'; ctx.font = 'bold 15px "Segoe UI", monospace';
        ctx.fillStyle = c.textColor; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(c.label, c.x, c.y-2);
        ctx.font = 'bold 9px monospace'; ctx.fillStyle = '#ddd'; ctx.fillText(c.type==='GPU'?'RTX':(c.type==='CPU'?'CORE':''), c.x, c.y+14);
        ctx.shadowBlur = 0;
      }
      function render(comps, gameActive, slicingActive) {
        drawBg();
        comps.forEach(drawComponent);
        if (slicingActive && gameActive) {
          ctx.beginPath(); ctx.arc(30, CH-30, 16, 0, 2*Math.PI); ctx.fillStyle = '#ff3366'; ctx.shadowColor='#ff0055'; ctx.shadowBlur=30; ctx.fill();
          ctx.shadowBlur=0; ctx.font='bold 20px "Segoe UI"'; ctx.fillStyle='white'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=16; ctx.fillText('⚡', 18, CH-22);
        }
        if (gameActive && comps.length===0) {
          ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#b0daff'; ctx.shadowColor='#0088ff'; ctx.shadowBlur=14;
          ctx.textAlign = 'center'; ctx.fillText('⟳ DRAG TO SLICE ⟳', CW/2, CH/2+30);
        }
      }
      return { render };
    })();

    // 输入处理
    const InputHandler = (() => {
      const canvas = document.getElementById('gameCanvas');
      const { CW, CH } = GameState;
      let slicing = false;
      function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        let cx, cy;
        if (e.touches) {
          if (!e.touches.length) return null;
          cx = e.touches[0].clientX; cy = e.touches[0].clientY;
        } else { cx = e.clientX; cy = e.clientY; }
        const rx = (cx - rect.left) / rect.width, ry = (cy - rect.top) / rect.height;
        return { x: Math.min(CW, Math.max(0, rx*CW)), y: Math.min(CH, Math.max(0, ry*CH)) };
      }
      function onStart(e) {
        e.preventDefault();
        if (!GameState.gameActive) return;
        slicing = true;
        const p = getCoords(e); if (p) GameState.sliceAt(p.x, p.y);
      }
      function onMove(e) {
        e.preventDefault();
        if (!slicing || !GameState.gameActive) return;
        const p = getCoords(e); if (p) GameState.sliceAt(p.x, p.y);
      }
      function onEnd(e) { e.preventDefault(); slicing = false; }
      function bind() {
        canvas.addEventListener('mousedown', onStart);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onEnd);
        canvas.addEventListener('mouseleave', () => slicing = false);
        canvas.addEventListener('touchstart', onStart, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onEnd);
        canvas.addEventListener('touchcancel', onEnd);
        canvas.addEventListener('contextmenu', e => e.preventDefault());
      }
      return { bind, get slicingActive() { return slicing; } };
    })();

    // UI元素更新
    const gameScoreSpan = document.getElementById('gameScoreDisplay');
    const gameTimerSpan = document.getElementById('gameTimerDisplay');
    function updateGameScore() {
      let s = String(GameState.score).padStart(4, '0');
      gameScoreSpan.textContent = s;
    }
    function updateGameTimer(sec) { gameTimerSpan.textContent = sec; }

    // 游戏循环
    let gameLoopId = null;
    let gameActive = false;
    function gameLoop(now) {
      if (gameActive && GameState.gameActive) {
        if (GameState.shouldSpawn(now)) GameState.spawn();
        GameState.updatePhysics();
        updateGameScore();
      }
      Renderer.render(GameState.components, GameState.gameActive, InputHandler.slicingActive);
      gameLoopId = requestAnimationFrame(gameLoop);
    }

    // 开始新游戏
    function startGameSession() {
      GameState.startSession();
      updateGameScore();
      updateGameTimer(60);
      TimerManager.start(60, (sec) => updateGameTimer(sec), onGameTimerFinish);
      showGame();
      gameLoopId = requestAnimationFrame(gameLoop);
    }

    // 游戏结束 (时间到)
    function onGameTimerFinish() {
      const finalScore = GameState.score;
      // 累加到仪表板余额
      userBalance += finalScore;
      updateDashboardBalance();
      // 清理并返回仪表板
      GameState.endSession();
      TimerManager.stop();
      showDashboard();
    }

    // 手动返回仪表板 (也结算分数)
    function endGameManually() {
      if (GameState.gameActive) {
        const finalScore = GameState.score;
        userBalance += finalScore;
        updateDashboardBalance();
        GameState.endSession();
        TimerManager.stop();
      }
      showDashboard();
    }

    // ---------- 绑定事件 ----------
    InputHandler.bind();

    document.getElementById('startGameBtn').addEventListener('click', () => {
      startGameSession();
    });

    document.getElementById('backToDashboardBtn').addEventListener('click', () => {
      endGameManually();
    });

    // 底部导航演示 (可扩展)
    document.querySelectorAll('.flex-col.items-center').forEach(item => {
      item.addEventListener('click', function() {
        if (!this.closest('#dashboard-view')) return;
        document.querySelectorAll('#dashboard-view .flex-col.items-center').forEach(n => {
          n.classList.remove('text-yellow-300', 'nav-active');
          n.classList.add('text-gray-400');
        });
        this.classList.add('text-yellow-300', 'nav-active');
        this.classList.remove('text-gray-400');
      });
    });

    // Telegram 初始化
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    // 初始化 TON Connect
    initTonConnect();
    updateDashboardBalance();
  })();
</script>
</body>
</html>
